<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160" role="img" aria-labelledby="title desc">
  <title id="title">LA UI logo</title>
  <desc id="desc">LA UI logo with block-style LA monogram and style guide wordmark.</desc>
  <defs>
    <mask id="la-brandmark-a-notch">
      <rect width="128" height="128" fill="white" />
      <path fill="black" d="M73 84 C73 81.8 74.8 80 77 80 H82 C84.2 80 86 81.8 86 84 V96 H73 Z" />
